<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#44624f" />
    <title>لا يوجد اتصال — فَزَوِّجُوهُ</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 2rem;
        text-align: center;
        background: #f7f5f1;
        color: #232d2a;
        font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
        line-height: 1.7;
      }
      svg {
        width: 72px;
        height: 72px;
      }
      h1 {
        margin: 0;
        font-size: 1.375rem;
      }
      p {
        margin: 0;
        max-width: 22rem;
        color: #6e7268;
      }
      button {
        min-height: 44px;
        padding: 0 1.5rem;
        border: 0;
        border-radius: 0.375rem;
        background: #44624f;
        color: #f7f5f1;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #2e4638;
      }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 512 512" aria-hidden="true">
      <rect width="512" height="512" rx="96" fill="#44624f" />
      <g fill="#f7f5f1">
        <rect x="144" y="144" width="224" height="224" rx="14" />
        <rect x="144" y="144" width="224" height="224" rx="14" transform="rotate(45 256 256)" />
      </g>
      <g fill="#44624f">
        <rect x="202" y="202" width="108" height="108" rx="8" />
        <rect x="202" y="202" width="108" height="108" rx="8" transform="rotate(45 256 256)" />
      </g>
    </svg>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تعذّر الوصول إلى «فَزَوِّجُوهُ». تحقّق من اتصالك ثم أعد المحاولة.</p>
    <button type="button" onclick="location.reload()">إعادة المحاولة</button>
  </body>
</html>
